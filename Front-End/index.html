<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meu Dashboard Financeiro</title>
    <style>
        /* Pequenos ajustes para os novos campos */
        .campo-grupo {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .campo-grupo label {
            font-size: 0.85em;
            color: #555;
            font-weight: bold;
        }
        .secao-filtro {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="date"], input[type="month"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <h1>💰 Gestão Financeira Pessoal</h1>
    
    <section class="resumo">
        <div class="card">
            <h4>Entradas</h4>
            <p id="total-entradas" class="receita">R$ 0,00</p>
        </div>
        <div class="card">
            <h4>Saídas</h4>
            <p id="total-saidas" class="despesa">R$ 0,00</p>
        </div>
        <div class="card">
            <h4>Saldo</h4>
            <p id="saldo-total">R$ 0,00</p>
        </div>
    </section>

    <section>
        <h3>Novo Registro</h3>
        <form id="form-transacao">
            <input type="text" id="descricao" placeholder="Ex: Aluguel, Almoço..." required>
            <input type="number" id="valor" placeholder="R$ 0,00" step="0.01" required>

            <select id="categoria">
                <option value="Alimentação">Alimentação</option>
                <option value="Lazer">Lazer</option>
                <option value="Transporte">Transporte</option>
                <option value="Salário">Salário</option>
                <option value="Saúde">Saúde</option>
                <option value="Outros">Outros</option>
            </select>

            <select id="tipo">
                <option value="despesa">Despesa (Saída)</option>
                <option value="receita">Receita (Entrada)</option>
            </select>

            <div class="campo-grupo">
                <label for="data">Data da Transação:</label>
                <input type="date" id="data" required>
            </div>

            <button type="submit">Adicionar</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>Resumo Visual (Gastos por Categoria)</h3>
        <div style="max-width: 300px; margin: 0 auto;">
            <canvas id="meuGrafico"></canvas>
        </div>
    </section>

    <section>
        <h3>Minhas Transações</h3>
        
        <div class="secao-filtro">
            <label for="filtro-mes">Visualizar Mês:</label>
            <input type="month" id="filtro-mes">
        </div>

        <ul id="lista-transacoes">
            </ul>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="script.js"></script>
</body>
</html>
